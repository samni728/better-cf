version: "3.7"

services:
  better-cf:
    build:
      context: .
      dockerfile: Dockerfile
    image: better-cf:latest
    container_name: better-cf
    restart: unless-stopped
    ports:
      - "${BETTER_CF_PORT:-18080}:18080"
    environment:
      LISTEN_ADDR: "0.0.0.0:18080"
      DATA_DIR: "/app/data"
      SCANNER_BIN: "/app/better-cloudflare-ip"
      BETTER_CF_DATA_DIR: "/app/data"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ./data:/app/data
